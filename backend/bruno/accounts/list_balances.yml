info:
  name: list_balances
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/accounts/balances"
  auth: inherit

script:
  afterResponse: |
    test("should return 200", function () {
      expect(res.getStatus()).to.equal(200);
    });

    test("should return accounts with balances", function () {
      const body = res.getBody();

      expect(body).to.be.an("array");

      if (body.length > 0) {
        expect(body[0]).to.have.property("balance");
      }
    });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
