info:
  name: list_archived_accounts
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/accounts/archived"
  auth: inherit

script:
  afterResponse: |
    test("should return 200", function () {
      expect(res.getStatus()).to.equal(200);
    });

    test("should return archived accounts array", function () {
      const body = res.getBody();

      expect(body).to.be.an("array");
    });

    test("archived accounts should contain is_archived=true", function () {
      const body = res.getBody();

      if (body.length > 0) {
        expect(body[0]).to.have.property("is_archived");
        expect(body[0].is_archived).to.equal(true);
      }
    });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
