info:
  name: create_goal
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/goals"
  body:
    type: json
    data: |-
      {
        "name": "New Laptop",
        "target_amount": 80000,
        "deadline": "2026-12-31T23:59:59Z"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        const body = res.getBody();

        test("should return goal id", function () {
          expect(body.id).to.be.a("number");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
