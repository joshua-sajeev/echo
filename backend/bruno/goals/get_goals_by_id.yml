info:
  name: get_goal_by_id
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/goals/{{goal_id}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        const body = res.getBody();

        test("should return goal object", function () {
          expect(body.id).to.be.a("number");
          expect(body.name).to.be.a("string");
          expect(body.target_amount).to.be.a("number");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
