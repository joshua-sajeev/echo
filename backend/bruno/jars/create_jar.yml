info:
  name: create_jar
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/jars/"
  body:
    type: json
    data: |-
      {
        "name": "Necessities",
        "allocation_type": "remainder",
        "value": 0
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        test("should return id in response", function () {
          const body = res.getBody();
          expect(body).to.have.property("id");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
