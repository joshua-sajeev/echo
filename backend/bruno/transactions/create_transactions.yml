info:
  name: create_transaction
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/transactions/"
  body:
    type: json
    data: |-
      {
        "name": "Salary May",
        "type": "income",
        "amount": 500000,
        "date": "2026-05-30T10:00:00Z",
        "to_account_id": 1,
        "category": "salary",
        "jar_id": 1,
        "is_master_income": true
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        test("should return id in response", function () {
          const body = res.getBody();
          expect(body).to.have.property("id");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
