{{ define "accounts" }}

<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">Accounts</h2>
    <button
      onclick="document.getElementById('add-account-form').classList.toggle('hidden')"
      class="w-8 h-8 flex items-center justify-center bg-zinc-950 border border-zinc-800 rounded-lg text-lg hover:border-zinc-600"
    >+</button>
  </div>

  <!-- ADD ACCOUNT FORM -->
  <div id="add-account-form" class="hidden mb-6">
    <form class="space-y-4"
          hx-post="/accounts"
          hx-target="#account-result"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset()">

      <div>
        <label class="block text-xs text-zinc-500 mb-2">Account Name *</label>
        <input name="name" required placeholder="e.g., HDFC Bank"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
      </div>
      <div>
        <label class="block text-xs text-zinc-500 mb-2">Opening Balance (optional)</label>
        <input name="opening_balance" type="number" step="0.01" placeholder="0.00"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
      </div>
      <button type="submit" class="bg-white text-black px-5 py-3 rounded-lg text-sm font-medium">
        Add Account
      </button>
    </form>
    <div id="account-result" class="mt-3"></div>
  </div>

  <!-- ACTIVE ACCOUNTS -->
  <div id="account-list"
       hx-get="/accounts"
       hx-trigger="intersect once, accountCreated from:body"
       hx-swap="innerHTML"
       class="space-y-3 text-sm">
  </div>

  <!-- ARCHIVED ACCOUNTS (hidden by default) -->
  <div id="archived-accounts" class="hidden mt-4 space-y-3 text-sm border-t border-zinc-800 pt-4">
    <p class="text-xs text-zinc-600 uppercase tracking-widest mb-2">Archived</p>
    <div id="archived-list"
         hx-get="/accounts/archived"
         hx-trigger="load-archived"
         hx-swap="innerHTML"
         class="space-y-2">
    </div>
  </div>

  <!-- toggle archived -->
  <div class="flex justify-end mt-4">
    <button
      onclick="toggleArchived()"
      title="Show archived accounts"
      class="text-zinc-700 hover:text-zinc-500 transition-colors text-lg"
    >⊘</button>
  </div>

</div>

<!-- CONTEXT MENU (long-press on mobile, 3-dot click on desktop) -->
<div id="account-ctx-menu"
     class="hidden fixed z-50 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl overflow-hidden"
     style="min-width:160px">
  <button onclick="ctxRename()"
          class="w-full text-left px-4 py-3 text-sm hover:bg-zinc-800 flex items-center gap-2">
    ✏️ Rename
  </button>
  <div class="h-px bg-zinc-800"></div>
  <button onclick="ctxArchive()"
          class="w-full text-left px-4 py-3 text-sm hover:bg-zinc-800 text-red-400 flex items-center gap-2">
    🗄 Archive
  </button>
</div>

<script>
// ─── context menu target ──────────────────────────────────────
let ctxTarget = null;

function openCtxMenu(e, row) {
  ctxTarget = row;
  const menu = document.getElementById('account-ctx-menu');
  menu.classList.remove('hidden');
  const x = Math.min(e.clientX, window.innerWidth  - 180);
  const y = Math.min(e.clientY, window.innerHeight - 120);
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  // dismiss on next interaction outside the menu
  setTimeout(() => document.addEventListener('pointerdown', dismissCtxMenuOutside, { once: true }), 10);
}

function dismissCtxMenuOutside(e) {
  const menu = document.getElementById('account-ctx-menu');
  if (!menu.contains(e.target)) dismissCtxMenu();
  else document.addEventListener('pointerdown', dismissCtxMenuOutside, { once: true });
}

function dismissCtxMenu() {
  document.getElementById('account-ctx-menu').classList.add('hidden');
}

// ─── click on name opens menu ────────────────────────────────
document.addEventListener('click', function(e) {
  // clicking the name text opens the context menu
  const nameEl = e.target.closest('.name-display');
  if (nameEl) {
    const row = nameEl.closest('.account-row');
    if (!row) return;
    const rect = nameEl.getBoundingClientRect();
    openCtxMenu({ clientX: rect.left, clientY: rect.bottom + 4 }, row);
    return;
  }

  // 3-dot button (kept for compatibility if Go renders one)
  const btn = e.target.closest('.dots-btn');
  if (btn) {
    e.stopPropagation();
    const row = btn.closest('.account-row');
    if (!row) return;
    const rect = btn.getBoundingClientRect();
    openCtxMenu({ clientX: rect.left, clientY: rect.bottom + 4 }, row);
  }
});



// ─── rename ───────────────────────────────────────────────────
function ctxRename() {
  dismissCtxMenu();
  if (!ctxTarget) return;
  ctxTarget.querySelector('.name-display').classList.add('hidden');
  const wrap  = ctxTarget.querySelector('.rename-input');
  const input = wrap.querySelector('input');
  wrap.classList.remove('hidden');
  input.focus();
  input.select();
}

function submitRename(input, id) {
  const name = input.value.trim();
  if (!name) { cancelRename(input); return; }

  fetch('/accounts/' + id + '/rename', {
    method: 'PATCH',
    body: new URLSearchParams({ name }),
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
  }).then(res => {
    if (res.ok) {
      // update data-name so a subsequent rename shows the right value
      const row = input.closest('.account-row');
      if (row) row.dataset.name = name;
      document.body.dispatchEvent(new CustomEvent('accountCreated'));
    } else {
      res.text().then(t => alert(t));
      cancelRename(input);
    }
  });
}

function cancelRename(input) {
  // short delay so Enter-to-submit isn't swallowed by the blur handler
  setTimeout(() => {
    const row = input.closest('.account-row');
    if (!row) return;
    // reset to last-known good name
    input.value = row.dataset.name || input.value;
    row.querySelector('.rename-input').classList.add('hidden');
    row.querySelector('.name-display').classList.remove('hidden');
  }, 100);
}

// ─── archive ──────────────────────────────────────────────────
function ctxArchive() {
  dismissCtxMenu();
  if (!ctxTarget) return;
  const id = ctxTarget.dataset.id;
  fetch('/accounts/' + id, { method: 'DELETE' })
    .then(res => {
      if (res.ok) {
        document.body.dispatchEvent(new CustomEvent('accountCreated'));
        const arch = document.getElementById('archived-accounts');
        if (!arch.classList.contains('hidden')) {
          htmx.trigger('#archived-list', 'load-archived');
        }
      }
    });
}

// ─── toggle archived ──────────────────────────────────────────
function toggleArchived() {
  const section = document.getElementById('archived-accounts');
  section.classList.toggle('hidden');
  if (!section.classList.contains('hidden')) {
    // always reload so the list is fresh
    htmx.trigger('#archived-list', 'load-archived');
  }
}
</script>

{{ end }}
