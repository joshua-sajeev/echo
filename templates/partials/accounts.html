{{ define "accounts" }}

<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">Accounts</h2>
    <button
      onclick="document.getElementById('add-account-form').classList.toggle('hidden')"
      class="w-8 h-8 flex items-center justify-center bg-zinc-950 border border-zinc-800 rounded-lg text-lg hover:border-zinc-600"
    >+</button>
  </div>

  <!-- ADD ACCOUNT FORM -->
  <div id="add-account-form" class="hidden mb-6">
    <form class="space-y-4"
          hx-post="/accounts"
          hx-target="#account-result"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) { this.reset(); }">

      <div>
        <label class="block text-xs text-zinc-500 mb-2">Account Name *</label>
        <input
          name="name"
          required
          placeholder="e.g., HDFC Bank"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"
        />
      </div>

      <div>
        <label class="block text-xs text-zinc-500 mb-2">Opening Balance (optional)</label>
        <input
          name="opening_balance"
          type="number"
          step="0.01"
          placeholder="0.00"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"
        />
      </div>

      <button type="submit" class="bg-white text-black px-5 py-3 rounded-lg text-sm font-medium">
        Add Account
      </button>

    </form>

    <!-- success / error lands here -->
    <div id="account-result" class="mt-3"></div>
  </div>

  <!-- ACCOUNT LIST
       - loads on first reveal
       - reloads when server fires the "accountCreated" event via HX-Trigger header
  -->
  <div id="account-list"
       hx-get="/accounts"
       hx-trigger="intersect once, accountCreated from:body"
       hx-swap="innerHTML"
       class="space-y-3 text-sm">
  </div>

</div>

{{ end }}
