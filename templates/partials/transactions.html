{{ define "transactions" }}

<!-- ADD -->
<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">

  <h2 class="text-lg font-semibold mb-4">Add Transaction</h2>

  <form class="space-y-4"
        hx-post="/transactions"
        hx-target="#transaction-list"
        hx-swap="beforeend"
        hx-on::after-request="this.reset(); document.getElementById('account-fields').innerHTML=''; document.getElementById('jar-fields').innerHTML=''">

    <!-- DATE + TYPE -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-zinc-500 mb-2">Date *</label>
        <input
          name="date"
          type="date"
          required
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"
        />
      </div>
      <div>
        <label class="block text-xs text-zinc-500 mb-2">Type *</label>
        <select
          name="type"
          required
          hx-get="/accounts/options"
          hx-include="[name='type']"
          hx-target="#account-fields"
          hx-trigger="change"
          hx-swap="innerHTML"
          onchange="this.form.querySelector('[name=master_income]') && (this.form.querySelector('[name=master_income]').closest('div').style.display = this.value === 'income' ? '' : 'none'); fetchJarFields(this.value, false)"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"
        >
          <option value="">Select type</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
          <option value="transfer">Transfer</option>
        </select>
      </div>
    </div>

    <!-- NAME + AMOUNT -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-zinc-500 mb-2">Name *</label>
        <input
          name="name"
          required
          placeholder="e.g. Salary"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"
        />
      </div>
      <div>
        <label class="block text-xs text-zinc-500 mb-2">Amount *</label>
        <input
          name="amount"
          type="number"
          step="0.01"
          required
          placeholder="0.00"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"
        />
      </div>
    </div>

    <!-- DYNAMIC ACCOUNT FIELDS -->
    <div id="account-fields" class="space-y-4"></div>

    <!-- MASTER INCOME (only for income type) -->
    <div id="master-income-field" style="display:none">
      <label class="flex items-center gap-3 cursor-pointer">
        <input
          type="checkbox"
          name="master_income"
          value="true"
          onchange="fetchJarFields(document.querySelector('[name=type]').value, this.checked)"
          class="w-4 h-4 accent-emerald-400"
        />
        <span class="text-sm text-zinc-300">Master Income <span class="text-xs text-zinc-500">(auto-split to jars)</span></span>
      </label>
    </div>

    <!-- DYNAMIC JAR FIELDS -->
    <div id="jar-fields" class="space-y-4"></div>

    <button
      type="submit"
      class="bg-white text-black px-5 py-3 rounded-lg text-sm font-medium"
    >
      Add Transaction
    </button>

  </form>
</div>


<!-- LIST -->
<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">

  <h2 class="text-lg font-semibold mb-4">Recent Transactions</h2>

  <div id="transaction-list"
       hx-get="/transactions"
       hx-trigger="load"
       class="space-y-3">
  </div>

</div>

<script>
  // show/hide master income field when type changes
  document.querySelector('[name=type]').addEventListener('change', function() {
    const masterField = document.getElementById('master-income-field');
    masterField.style.display = this.value === 'income' ? '' : 'none';
    // reset master income checkbox
    const cb = document.querySelector('[name=master_income]');
    if (cb) cb.checked = false;
  });

  // fetch jar fields based on type + master_income state
  function fetchJarFields(txType, isMaster) {
    if (!txType) return;
    const params = new URLSearchParams({ type: txType, master: isMaster ? 'true' : 'false' });
    fetch('/jars/options?' + params)
      .then(r => r.text())
      .then(html => { document.getElementById('jar-fields').innerHTML = html; });
  }
</script>

{{ end }}
