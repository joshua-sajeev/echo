{{ define "new_transaction" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Transaction – Echo Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<nav class="border-b border-zinc-800 bg-zinc-950">
  <div class="max-w-lg mx-auto px-6 py-4 flex justify-between items-center">
    <a href="/" class="text-zinc-400 hover:text-white transition text-sm">← Back</a>
    <h1 class="text-base font-semibold" id="page-title">New Transaction</h1>
    <div class="w-12"></div>
  </div>
</nav>

<!-- prefill banner — shown when coming from a template -->
<div id="prefill-banner" class="hidden bg-zinc-900 border-b border-zinc-800">
  <div class="max-w-lg mx-auto px-6 py-2 flex items-center gap-2">
    <span class="text-xs text-zinc-500">From template:</span>
    <span id="prefill-banner-name" class="text-xs text-zinc-300 font-medium"></span>
    <a href="/transactions/new" class="ml-auto text-xs text-zinc-600 hover:text-zinc-400 transition">Clear</a>
  </div>
</div>

<main class="max-w-lg mx-auto px-6 py-8">

  <div class="flex rounded-lg bg-zinc-900 border border-zinc-800 p-1 mb-6">
    <button onclick="switchType('expense')" id="tab-expense"
      class="flex-1 py-2 text-sm rounded-md font-medium transition tab-btn bg-zinc-800 text-white">
      Expense
    </button>
    <button onclick="switchType('income')" id="tab-income"
      class="flex-1 py-2 text-sm rounded-md font-medium transition tab-btn text-zinc-500">
      Income
    </button>
    <button onclick="switchType('transfer')" id="tab-transfer"
      class="flex-1 py-2 text-sm rounded-md font-medium transition tab-btn text-zinc-500">
      Transfer
    </button>
  </div>

  <form id="tx-form" class="space-y-4"
        hx-post="/transactions"
        hx-target="#form-result"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) { window.location.href='/' }">

    <input type="hidden" name="type" id="tx-type" value="expense"/>

    <div>
      <label class="block text-xs text-zinc-500 mb-2">Date *</label>
      <input name="date" id="tx-date" type="date" required
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
    </div>

    <div>
      <label class="block text-xs text-zinc-500 mb-2">Name *</label>
      <input name="name" id="tx-name" required placeholder="e.g. Zomato Order"
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
    </div>

    <div>
      <label class="block text-xs text-zinc-500 mb-2">Amount *</label>
      <input name="amount" id="tx-amount" type="number" step="0.01" required placeholder="0.00"
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
    </div>

    <div id="dynamic-fields" class="space-y-4"></div>
    <div id="form-result"></div>

    <button type="submit"
      class="w-full bg-white text-black py-3 rounded-lg text-sm font-medium hover:bg-zinc-200 transition">
      Save Transaction
    </button>
  </form>
</main>

<script>
// ── prefill params from template ──────────────────────────────
const _params        = new URLSearchParams(location.search);
const _prefillName   = _params.get('prefill_name')        || '';
const _prefillType   = _params.get('prefill_type')        || 'expense';
const _prefillAmount = _params.get('prefill_amount')      || '';
const _prefillJarId  = _params.get('prefill_jar_id')      || '';
const _prefillJar    = _params.get('prefill_jar')         || '';
const _prefillFromId = _params.get('prefill_from_acc_id') || '';
const _prefillToId   = _params.get('prefill_to_acc_id')   || '';
const _prefillMaster = _params.get('prefill_master')      === 'true';

// Set today's date
document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];

// Apply scalar prefills
if (_prefillName) {
  document.getElementById('tx-name').value = _prefillName;
  document.getElementById('prefill-banner').classList.remove('hidden');
  document.getElementById('prefill-banner-name').textContent = _prefillName;
}
if (_prefillAmount && _prefillAmount !== '0') {
  document.getElementById('tx-amount').value = _prefillAmount;
}

// Switch to correct type tab then load dynamic fields
switchType(_prefillType);

function switchType(type) {
  document.getElementById('tx-type').value = type;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('bg-zinc-800', 'text-white');
    btn.classList.add('text-zinc-500');
  });
  const active = document.getElementById('tab-' + type);
  active.classList.add('bg-zinc-800', 'text-white');
  active.classList.remove('text-zinc-500');
  loadDynamicFields(type);
}

function loadDynamicFields(type, masterOverride) {
  const isMaster = masterOverride !== undefined ? masterOverride : _prefillMaster;
  const url = '/transactions/fields?type=' + type + (isMaster ? '&master=true' : '');
  fetch(url)
    .then(r => r.text())
    .then(html => {
      document.getElementById('dynamic-fields').innerHTML = html;
      applyPrefills(type, isMaster);
    });
}

// Pre-select accounts and jar by ID / name after fields render
function applyPrefills(type, isMaster) {
  if (type === 'expense') {
    preselectById('select[name="account"]',  _prefillFromId);
    preselectById('select[name="jar_id"]',   _prefillJarId) || preselectByText('select[name="jar_id"]', _prefillJar);

  } else if (type === 'income') {
    preselectById('select[name="account"]',  _prefillToId);
    // master income checkbox
    const cb = document.querySelector('input[name="master_income"]');
    if (cb && isMaster) cb.checked = true;
    if (!isMaster) {
      preselectById('select[name="jar_id"]', _prefillJarId) || preselectByText('select[name="jar_id"]', _prefillJar);
    }

  } else if (type === 'transfer') {
    preselectById('select[name="from"]', _prefillFromId);
    preselectById('select[name="to"]',   _prefillToId);
  }
}

function preselectById(selector, id) {
  if (!id || id === '0') return false;
  const sel = document.querySelector(selector);
  if (!sel) return false;
  for (const opt of sel.options) {
    if (opt.value === String(id)) { opt.selected = true; return true; }
  }
  return false;
}

function preselectByText(selector, text) {
  if (!text) return false;
  const sel = document.querySelector(selector);
  if (!sel) return false;
  for (const opt of sel.options) {
    if (opt.text === text) { opt.selected = true; return true; }
  }
  return false;
}

function onMasterIncomeChange(cb) {
  loadDynamicFields('income', cb.checked);
}
</script>
</body>
</html>
{{ end }}
