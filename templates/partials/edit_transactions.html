{{ define "edit_transaction" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Transaction – Echo Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<nav class="border-b border-zinc-800 bg-zinc-950">
  <div class="max-w-lg mx-auto px-6 py-4 flex justify-between items-center">
    <a href="javascript:history.back()" class="text-zinc-400 hover:text-white transition text-sm">← Back</a>
    <h1 class="text-base font-semibold">Edit Transaction</h1>
    <div class="w-12"></div>
  </div>
</nav>

<main class="max-w-lg mx-auto px-6 py-8">

  <!-- type badge — read-only on edit -->
  <div class="flex rounded-lg bg-zinc-900 border border-zinc-800 p-1 mb-6">
    <div id="type-badge"
      class="flex-1 py-2 text-sm rounded-md font-medium text-center bg-zinc-800 text-white capitalize">
      Loading…
    </div>
  </div>

  <form id="tx-form" class="space-y-4">

    <input type="hidden" name="type" id="tx-type"/>

    <div>
      <label class="block text-xs text-zinc-500 mb-2">Date *</label>
      <input name="date" id="tx-date" type="date" required
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
    </div>

    <div>
      <label class="block text-xs text-zinc-500 mb-2">Name *</label>
      <input name="name" id="tx-name" required
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
    </div>

    <div>
      <label class="block text-xs text-zinc-500 mb-2">Amount *</label>
      <input name="amount" id="tx-amount" type="number" step="0.01" required
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 outline-none focus:border-zinc-600"/>
    </div>

    <!-- dynamic fields pre-populated from server -->
    <div id="dynamic-fields" class="space-y-4">
      <div class="text-zinc-600 text-xs py-2">Loading…</div>
    </div>

    <div id="form-error"
      class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2">
    </div>

    <button type="button" onclick="submitEdit()"
      class="w-full bg-white text-black py-3 rounded-lg text-sm font-medium hover:bg-zinc-200 transition">
      Save Changes
    </button>

  </form>
</main>

<script>
const _txId = location.pathname.split('/')[2];

// load scalar fields (name, amount, date, type)
fetch('/transactions/' + _txId + '/data')
  .then(r => r.json())
  .then(tx => {
    document.getElementById('tx-type').value   = tx.type;
    document.getElementById('tx-name').value   = tx.name;
    document.getElementById('tx-amount').value = tx.amount;
    document.getElementById('tx-date').value   = tx.date;
    document.getElementById('type-badge').textContent = tx.type;
  });

// load pre-populated dynamic fields (account selects, jar, master income)
fetch('/transactions/' + _txId + '/fields')
  .then(r => r.text())
  .then(html => {
    document.getElementById('dynamic-fields').innerHTML = html;
  });

// called when master income checkbox is toggled
function onMasterIncomeChange(cb) {
  fetch('/transactions/fields?type=income&master=' + cb.checked)
    .then(r => r.text())
    .then(html => {
      document.getElementById('dynamic-fields').innerHTML = html;
    });
}

function submitEdit() {
  const form  = document.getElementById('tx-form');
  const data  = new FormData(form);
  const errEl = document.getElementById('form-error');
  errEl.classList.add('hidden');

  fetch('/transactions/' + _txId, {
    method:  'PATCH',
    body:    new URLSearchParams(data),
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
  }).then(res => {
    if (res.ok) {
      window.location.href = '/';
    } else {
      res.text().then(t => {
        errEl.textContent = t || 'Update failed';
        errEl.classList.remove('hidden');
      });
    }
  });
}
</script>

</body>
</html>
{{ end }}
