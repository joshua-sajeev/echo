{{ define "content" }}

<!-- STAT CARDS -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
  <div class="bg-zinc-900 border border-zinc-800 border-l-4 border-l-emerald-400 rounded-xl p-6">
    <p class="text-zinc-400 text-sm">Total Balance</p>
    <h2 class="text-3xl font-semibold mt-2 text-emerald-300">₹{{printf "%.2f" .TotalBalance}}</h2>
  </div>
  <div class="bg-zinc-900 border border-zinc-800 border-l-4 border-l-red-400 rounded-xl p-6">
    <p class="text-zinc-400 text-sm">Monthly Expenses</p>
    <h2 class="text-3xl font-semibold mt-2 text-red-300">₹{{printf "%.2f" .MonthlyExpenses}}</h2>
  </div>
  <div class="bg-zinc-900 border border-zinc-800 border-l-4 border-l-blue-400 rounded-xl p-6">
    <p class="text-zinc-400 text-sm">Savings</p>
    <h2 class="text-3xl font-semibold mt-2 text-blue-300">₹{{printf "%.2f" .Savings}}</h2>
  </div>
</section>

<!-- QUICK ACTION BAR — easy thumb reach on mobile -->
<section class="grid grid-cols-2 gap-3 mb-8">
  <a href="/transactions/new"
     class="flex items-center justify-center gap-2.5 bg-white text-black rounded-xl py-4 text-sm font-semibold hover:bg-zinc-200 active:scale-95 transition-all">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
    </svg>
    Add Transaction
  </a>
  <a href="/templates"
     class="flex items-center justify-center gap-2.5 bg-zinc-900 border border-zinc-700 text-zinc-200 rounded-xl py-4 text-sm font-semibold hover:bg-zinc-800 hover:border-zinc-600 active:scale-95 transition-all">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    Quick Templates
  </a>
</section>

<!-- MAIN CONTENT -->
<section class="grid grid-cols-1 lg:grid-cols-3 gap-8">
  <div class="space-y-6">
    {{ template "jars" . }}
    {{ template "accounts" . }}
  </div>
  <div class="lg:col-span-2 space-y-8">
    {{ template "recent_transactions" . }}
  </div>
</section>

{{ end }}
